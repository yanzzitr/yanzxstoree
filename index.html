<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YANN YGY STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* LOADING */

#loading{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
}

.loader{
width:70px;
height:70px;
border:5px solid #222;
border-top:5px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* INTRO */

#intro{
position:relative;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:
radial-gradient(circle at center,#081326,#000);
}

/* STARS */

.stars{
position:absolute;
inset:0;
overflow:hidden;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:starMove linear infinite;
}

@keyframes starMove{
from{
transform:translateY(-100vh);
}
to{
transform:translateY(100vh);
}
}

/* NEBULA */

.nebula{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:.35;
}

.nebula1{
width:400px;
height:400px;
background:#00aaff;
top:-100px;
left:-100px;
animation:moveNebula 8s infinite alternate;
}

.nebula2{
width:500px;
height:500px;
background:#6a00ff;
bottom:-150px;
right:-150px;
animation:moveNebula 10s infinite alternate;
}

@keyframes moveNebula{
from{
transform:translate(0,0);
}
to{
transform:translate(50px,-30px);
}
}

/* METEOR */

.meteor{
position:absolute;
width:250px;
height:3px;
background:white;
top:20%;
left:-300px;
transform:rotate(-25deg);
box-shadow:0 0 20px white;
animation:meteorMove 3s linear infinite;
}

@keyframes meteorMove{
from{
left:-300px;
top:20%;
}
to{
left:120%;
top:60%;
}
}

/* ROCKET */

.rocket{
position:absolute;
font-size:70px;
bottom:-100px;
left:50%;
transform:translateX(-50%);
animation:launch 5s linear infinite;
}

@keyframes launch{
from{
bottom:-100px;
}
to{
bottom:120%;
}
}

/* INTRO CONTENT */

.intro-content{
position:relative;
z-index:10;
}

.intro-content h1{
font-size:3rem;
text-shadow:
0 0 10px #00aaff,
0 0 30px #00aaff;
}

.intro-content p{
margin-top:10px;
color:#ddd;
}

.enter-btn{
margin-top:20px;
padding:12px 35px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

/* WEBSITE */

#website{
display:none;
min-height:100vh;

background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.65)
),
url('https://files.catbox.moe/hfwrix.png');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HAMBURGER */

.burger{
position:fixed;
top:15px;
left:15px;
width:45px;
height:45px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.7);
border-radius:10px;
cursor:pointer;
z-index:99999;
}

.hidden{
display:none!important;
}

/* SIDE MENU */

.side-menu{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#111;
padding-top:80px;
transition:.4s;
z-index:99998;
}

.side-menu a{
display:block;
padding:15px 20px;
color:white;
text-decoration:none;
border-bottom:1px solid #222;
}

/* WELCOME */

.welcome{
text-align:center;
padding-top:100px;
}

.welcome h1{
font-size:2rem;
}

.welcome h2{
color:#00bfff;
margin-top:10px;
}

/* PRODUCTS */

.products{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:40px 20px;
}

.card{
width:260px;
background:#111;
border-radius:15px;
overflow:hidden;
border:1px solid #222;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.content{
padding:15px;
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* POPUP */

.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
z-index:999999;
}

.popup-box{
width:320px;
background:#111;
padding:20px;
border-radius:15px;
text-align:center;
}

.popup-box button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

@media(max-width:768px){

.products{
flex-direction:column;
align-items:center;
}

.card{
width:90%;
}

}

</style>

</head>
<body>

<!-- LOADING -->
<div id="loading">

    <div class="loader"></div>

    <h2 style="margin-top:20px;">
        YANN YGY STORE
    </h2>

    <p style="margin-top:10px;">
        Memuat Sistem...
    </p>

</div>

<!-- HAMBURGER -->
<div class="burger hidden" id="burger" onclick="toggleMenu()">
☰
</div>

<!-- MENU -->
<div class="side-menu" id="sideMenu">

    <a href="#" onclick="goHome()">
        🏠 Home
    </a>

    <a href="#" onclick="pilihProduk()">
        🛒 Produk
    </a>

    <a href="https://wa.me/62882001163626?text=Min%20mau%20lapor%20website%20ada%20kendala"
       target="_blank">
        💬 Hubungi Admin
    </a>

</div>

<!-- INTRO -->
<section id="intro">

    <!-- STARS -->
    <div class="stars" id="stars"></div>

    <!-- NEBULA -->
    <div class="nebula nebula1"></div>
    <div class="nebula nebula2"></div>

    <!-- METEOR -->
    <div class="meteor"></div>

    <!-- ROCKET -->
    <div class="rocket">
        🚀
    </div>

    <!-- CONTENT -->
    <div class="intro-content">

        <h1>
            YANN YGY STORE
        </h1>

        <p id="welcomeText">
            Welcome To Galaxy Store
        </p>

        <button class="enter-btn" onclick="enterStore()">
            ENTER STORE
        </button>

    </div>

</section>

<!-- WEBSITE -->
<div id="website">

    <!-- WELCOME -->
    <section class="welcome">

        <h1>
            WELCOME TO WEBSITE
        </h1>

        <h2>
            YANN YGY STORE
        </h2>

        <p style="margin-top:10px;">
            Trusted Digital Store
        </p>

    </section>

    <!-- PRODUCTS -->
    <section class="products">

        <!-- FREE FIRE -->
        <div class="card" id="ffPolosan">

            <img
            src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800"
            alt="Free Fire">

            <div class="content">

                <h3>
                    STOK AKUN FREE FIRE
                </h3>

                <p>
                    Akun siap main dan siap pakai.
                </p>

                <button
                class="btn"
                onclick="buyPolosan()">

                    BELI SEKARANG

                </button>

            </div>

        </div>

        <!-- FREE FIRE GOIB -->
        <div class="card" id="ffGoib">

            <img
            src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=800"
            alt="Free Fire Goib">

            <div class="content">

                <h3>
                    STOK ID FREE FIRE GOIB
                </h3>

                <p>
                    ID pilihan dan siap digunakan.
                </p>

                <button
                class="btn"
                onclick="buyGoib()">

                    BELI SEKARANG

                </button>

            </div>

        </div>

    </section>

</div>

<!-- POPUP PRODUK -->
<div class="popup" id="produkPopup">

    <div class="popup-box">

        <h2>
            Pilih Produk
        </h2>

        <button onclick="bukaPolosan()">
            🎮 STOK AKUN FREE FIRE
        </button>

        <button onclick="bukaGoib()">
            👑 STOK ID FREE FIRE GOIB
        </button>

        <button onclick="tutupPopup()">
            ❌ BATAL
        </button>

    </div>

</div>

<script>

/* LOADING */

window.onload = function(){

    setTimeout(() => {

        document.getElementById("loading").style.display = "none";

    },2000);

};

/* TEKS INTRO */

const messages = [
    "Welcome To Galaxy Store 🚀",
    "Trusted Digital Store ✨",
    "Temukan akun terbaik hari ini 🔥",
    "Selamat Berbelanja 👋"
];

document.getElementById("welcomeText").innerText =
messages[Math.floor(Math.random() * messages.length)];

/* BINTANG */

const starsContainer =
document.getElementById("stars");

for(let i=0;i<100;i++){

    let star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random() * 100 + "vw";

    star.style.top =
    Math.random() * 100 + "vh";

    star.style.animationDuration =
    (Math.random() * 5 + 3) + "s";

    starsContainer.appendChild(star);

}

/* ENTER */

function enterStore(){

    document.getElementById("intro")
    .style.display = "none";

    document.getElementById("website")
    .style.display = "block";

    document.getElementById("burger")
    .classList.remove("hidden");

}

/* HAMBURGER */

function toggleMenu(){

    const menu =
    document.getElementById("sideMenu");

    menu.style.left =
    menu.style.left === "0px"
    ? "-260px"
    : "0px";

}

/* HOME */

function goHome(){

    document.getElementById("sideMenu")
    .style.left = "-260px";

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

}

/* POPUP PRODUK */

function pilihProduk(){

    document.getElementById("sideMenu")
    .style.left = "-260px";

    document.getElementById("produkPopup")
    .style.display = "flex";

}

function tutupPopup(){

    document.getElementById("produkPopup")
    .style.display = "none";

}

/* PRODUK FF */

function bukaPolosan(){

    tutupPopup();

    document.getElementById("ffPolosan")
    .scrollIntoView({
        behavior:"smooth",
        block:"center"
    });

}

/* PRODUK FF GOIB */

function bukaGoib(){

    tutupPopup();

    document.getElementById("ffGoib")
    .scrollIntoView({
        behavior:"smooth",
        block:"center"
    });

}

/* BELI FF */

function buyPolosan(){

    const nomor =
    "62882001163626";

    const pesan =
    "Min saya mau beli stok akun free fire";

    window.open(
        "https://wa.me/" +
        nomor +
        "?text=" +
        encodeURIComponent(pesan),
        "_blank"
    );

}

/* BELI FF GOIB */

function buyGoib(){

    const nomor =
    "62882001163626";

    const pesan =
    "Min saya mau beli stok id free fire goib";

    window.open(
        "https://wa.me/" +
        nomor +
        "?text=" +
        encodeURIComponent(pesan),
        "_blank"
    );

}

</script>

</body>
    </html>
