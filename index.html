<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI Camera Pro Max Full Mode</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
font-family:system-ui;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
transition:filter .3s ease, transform .1s linear;
}

canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
}

.blur{filter:blur(18px) brightness(0.85);}

/* UI */
#uiTop{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
padding:10px 14px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:12px;
color:#fff;
font-size:13px;
}

#uiBottom{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:#fff;
background:rgba(0,0,0,0.4);
padding:8px 12px;
border-radius:10px;
font-size:14px;
}

#rec{
position:absolute;
top:16px;
right:16px;
width:12px;
height:12px;
border-radius:50%;
background:#555;
}

.recOn{background:red;animation:pulse .8s infinite;}

@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(1.6);opacity:.4}
100%{transform:scale(1);opacity:1}
}

/* FILTERS */
.neon{filter:contrast(1.4) saturate(2) hue-rotate(80deg);}
.glitch{animation:gl .2s infinite;}
@keyframes gl{
0%{transform:translate(0)}
25%{transform:translate(2px,-2px)}
50%{transform:translate(-2px,2px)}
75%{transform:translate(2px,2px)}
100%{transform:translate(0)}
}
.rgb{filter:contrast(1.2) saturate(2);}
.iphone{filter:contrast(1.35) saturate(1.25) brightness(1.08);}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="uiTop">INIT AI CAMERA...</div>
<div id="uiBottom">Loading...</div>
<div id="rec"></div>

<script type="module">

import {HandLandmarker,FilesetResolver,DrawingUtils}
from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

/* ===== AUDIO ===== */
const audio=new Audio("https://files.catbox.moe/oe5o3d.mp3");
audio.loop=true;

/* ===== STATE ===== */
let landmarker;
let lastPos=null;
let moving=false;

/* AI */
let smoothBright=1;
let smoothX=0;
let smoothY=0;

/* FILTER */
let idx=0;
const filters=["NORMAL","NEON","GLITCH","RGB","IPHONE"];

/* RECORD */
let recorder;
let chunks=[];
let isRec=false;
let holdTimer=null;

/* ===== CAMERA ===== */
async function cam(){
const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
video.srcObject=s;
await video.play();
}

/* ===== MODEL ===== */
async function model(){
const vision=await FilesetResolver.forVisionTasks(
"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
);

landmarker=await HandLandmarker.createFromOptions(vision,{
baseOptions:{
modelAssetPath:
"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker.task"
},
runningMode:"VIDEO",
numHands:2
});
}

/* ===== FINGER ===== */
function fingerCount(lm){
let c=0;
if(lm[8].y<lm[6].y) c++;
if(lm[12].y<lm[10].y) c++;
if(lm[16].y<lm[14].y) c++;
if(lm[20].y<lm[18].y) c++;
if(lm[4].x<lm[3].x) c++;
return c;
}

function moveDetect(lm){
const p=lm[9];
if(!lastPos){lastPos=p;return false;}
const d=Math.hypot(p.x-lastPos.x,p.y-lastPos.y);
lastPos=p;
return d>0.01;
}

/* ===== AI ENGINE ===== */
function ai(hand,fingers,moving){

let targetBright = hand ? 1.15 : 1.3;
smoothBright += (targetBright - smoothBright)*0.05;

let depth = 1;
if(fingers===5) depth=1.08;
else if(hand) depth=1.02;

smoothX += (0-smoothX)*0.08;
smoothY += (0-smoothY)*0.08;

video.style.filter = `brightness(${smoothBright}) contrast(1.25) saturate(1.3)`;
video.style.transform = `scaleX(-1) scale(${depth})`;
}

/* ===== FILTER ===== */
function apply(){
video.classList.remove("neon","glitch","rgb","iphone");

if(filters[idx]==="NEON") video.classList.add("neon");
if(filters[idx]==="GLITCH") video.classList.add("glitch");
if(filters[idx]==="RGB") video.classList.add("rgb");
if(filters[idx]==="IPHONE") video.classList.add("iphone");
}

/* ===== RECORD ===== */
function startRec(){
const stream=canvas.captureStream(30);
recorder=new MediaRecorder(stream,{mimeType:"video/webm"});
chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=()=>{
const blob=new Blob(chunks,{type:"video/webm"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;
a.download="ai-camera.webm";
a.click();
};

recorder.start();
isRec=true;
document.getElementById("rec").classList.add("recOn");
}

function stopRec(){
recorder.stop();
isRec=false;
document.getElementById("rec").classList.remove("recOn");
}

/* ===== INPUT ===== */
document.body.addEventListener("touchstart",()=>{
holdTimer=setTimeout(()=>{
if(!isRec) startRec(); else stopRec();
},900);
});

document.body.addEventListener("touchend",()=>{
if(holdTimer) clearTimeout(holdTimer);
if(!isRec){
idx=(idx+1)%filters.length;
apply();
}
});

/* ===== DRAW ===== */
function draw(hands){
ctx.clearRect(0,0,canvas.width,canvas.height);
if(!hands) return;

const d=new DrawingUtils(ctx);

for(const h of hands){
d.drawConnectors(h,HandLandmarker.HAND_CONNECTIONS,{
color:"#00ff88",lineWidth:3
});
d.drawLandmarks(h,{
color:"#00e5ff",radius:4
});
}
}

/* ===== LOOP ===== */
function loop(){

if(!landmarker||video.readyState<2){
requestAnimationFrame(loop);
return;
}

const res=landmarker.detectForVideo(video,performance.now());

ctx.save();
ctx.scale(-1,1);
ctx.translate(-canvas.width,0);

draw(res.landmarks);

ctx.restore();

let fingers=0;
let hand=false;

if(res.landmarks?.length){
hand=true;
for(const lm of res.landmarks){
fingers=Math.max(fingers,fingerCount(lm));
if(moveDetect(lm)) moving=true;
}
}else{
moving=false;
lastPos=null;
}

if(!hand){
audio.pause();
document.getElementById("uiTop").innerText="NO HAND";
}
else if(moving){
document.getElementById("uiTop").innerText="MOVING HAND";
if(audio.paused) audio.play();
clearTimeout(window.t);
window.t=setTimeout(()=>audio.pause(),500);
}
else{
document.getElementById("uiTop").innerText=fingers===5?"BLUR MODE":"NORMAL";

if(fingers===5) video.classList.add("blur");
else video.classList.remove("blur");

audio.pause();
}

document.getElementById("uiBottom").innerText=
`Fingers: ${fingers} | Filter: ${filters[idx]}`;

ai(hand,fingers,moving);

requestAnimationFrame(loop);
}

/* ===== START ===== */
async function main(){
await cam();
await model();
apply();
loop();
}

main();

</script>
</body>
</html>
