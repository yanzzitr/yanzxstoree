<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorter ID Kembar - YGY STORE</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
    margin:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
textarea{
    width:100%;
    height:220px;
    background:#222;
    color:#0f0;
    border:none;
    padding:10px;
    border-radius:8px;
    resize:vertical;
}
button{
    padding:12px 25px;
    border:none;
    background:#00c853;
    color:white;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}
button:hover{
    background:#00a844;
}
pre{
    background:#222;
    padding:15px;
    border-radius:8px;
    white-space:pre-wrap;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<h2>🔢 Sorter ID Kembar</h2>

<p>Masukkan daftar ID (1 baris 1 ID)</p>

<textarea id="input"></textarea>

<br>

<button onclick="sortID()">Susun ID</button>

<pre id="hasil"></pre>

</div>

<script>

function maxRepeat(str){

let max=1;
let count=1;

for(let i=1;i<str.length;i++){

if(str[i]==str[i-1]){
count++;
}else{
count=1;
}

if(count>max)max=count;

}

return max;

}

function sortID(){

let data=document.getElementById("input").value.trim().split(/\s+/);

let hasil={
4:[],
5:[],
6:[],
7:[],
8:[]
};

data.forEach(id=>{

let m=maxRepeat(id);

if(m>=8){
hasil[8].push(id);
}else if(m==7){
hasil[7].push(id);
}else if(m==6){
hasil[6].push(id);
}else if(m==5){
hasil[5].push(id);
}else if(m==4){
hasil[4].push(id);
}

});

let out="";

[8,7,6,5,4].forEach(x=>{

out+="KEMBAR "+x+" : "+hasil[x].length+" ID\n";
out+=hasil[x].join("\n");
out+="\n\n";

});

document.getElementById("hasil").textContent=out;

}

</script>

</body>
</html>
