<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>Hand Blur Camera AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
touch-action:none;
}

#app{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

video,
canvas{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
object-fit:cover;
}

#camera{
z-index:1;
filter:blur(0px);
transition:filter .35s ease;
background:#000;
}

#freezeCanvas{
z-index:2;
display:none;
}

#skeletonCanvas{
z-index:3;
pointer-events:none;
}

#loading{
position:absolute;
top:18px;
left:50%;
transform:translateX(-50%);
z-index:100;

padding:12px 18px;

background:rgba(0,0,0,.55);

color:#fff;

border-radius:50px;

font-size:15px;

backdrop-filter:blur(10px);
}

#startBtn{
position:absolute;
left:50%;
bottom:35px;
transform:translateX(-50%);
z-index:100;

border:none;
outline:none;

padding:16px 28px;

border-radius:999px;

font-size:17px;
font-weight:bold;

background:#18a0fb;
color:#fff;
}

</style>

</head>

<body>

<div id="app">

<video
id="camera"
playsinline
autoplay
muted>
</video>

<canvas id="freezeCanvas"></canvas>

<canvas id="skeletonCanvas"></canvas>

<div id="loading">

Tekan Mulai Kamera

</div>

<button id="startBtn">

Mulai Kamera

</button>

<audio
id="bgm"
loop
preload="auto">

<source
src="https://files.catbox.moe/oe5o3d.mp3"
type="audio/mpeg">

</audio>

<script type="module">

import {
    FilesetResolver,
    HandLandmarker
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("camera");
const freezeCanvas = document.getElementById("freezeCanvas");
const skeletonCanvas = document.getElementById("skeletonCanvas");

const freezeCtx = freezeCanvas.getContext("2d");
const skeletonCtx = skeletonCanvas.getContext("2d");

const loading = document.getElementById("loading");
const startBtn = document.getElementById("startBtn");
const bgm = document.getElementById("bgm");

let handLandmarker;

let running = false;

let lastVideoTime = -1;

let lastLandmarks = null;

let fingerCount = 0;

let isFrozen = false;

let isMusicPlaying = false;

startBtn.addEventListener("click", startSystem);

async function startSystem(){

    startBtn.disabled = true;

    loading.textContent = "Meminta izin kamera...";

    const stream = await navigator.mediaDevices.getUserMedia({

        video:{
            facingMode:"user",
            width:{ideal:1280},
            height:{ideal:720}
        },

        audio:false

    });

    video.srcObject = stream;

    await video.play();

    freezeCanvas.width = video.videoWidth;
    freezeCanvas.height = video.videoHeight;

    skeletonCanvas.width = video.videoWidth;
    skeletonCanvas.height = video.videoHeight;

    loading.textContent = "Memuat AI...";

    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    handLandmarker = await HandLandmarker.createFromOptions(
        vision,
        {
            baseOptions:{
                modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },

            runningMode:"VIDEO",

            numHands:1

        }
    );

    running = true;

    loading.textContent = "AI Aktif";

    requestAnimationFrame(detectHands);

}

function detectHands() {

    if (!running) {
        requestAnimationFrame(detectHands);
        return;
    }

    if (video.readyState < 2) {
        requestAnimationFrame(detectHands);
        return;
    }

    if (video.currentTime !== lastVideoTime) {

        lastVideoTime = video.currentTime;

        const results = handLandmarker.detectForVideo(
            video,
            performance.now()
        );

        skeletonCtx.clearRect(
            0,
            0,
            skeletonCanvas.width,
            skeletonCanvas.height
        );

        if (results && results.landmarks.length > 0) {

            const landmarks = results.landmarks[0];

            drawSkeleton(landmarks);

            fingerCount = countFingers(landmarks);

            loading.textContent =
                "Jari : " + fingerCount;

            processHand(
                fingerCount,
                landmarks
            );

        } else {

            loading.textContent =
                "Jari : 0";

            processHand(
                0,
                null
            );

        }

    }

    requestAnimationFrame(detectHands);

}

const HAND_CONNECTIONS = [

    [0,1],[1,2],[2,3],[3,4],

    [0,5],[5,6],[6,7],[7,8],

    [5,9],[9,10],[10,11],[11,12],

    [9,13],[13,14],[14,15],[15,16],

    [13,17],[17,18],[18,19],[19,20],

    [0,17]

];

function drawSkeleton(landmarks){

    skeletonCtx.lineWidth = 4;
    skeletonCtx.lineCap = "round";
    skeletonCtx.lineJoin = "round";

    // Garis skeleton
    skeletonCtx.strokeStyle = "#00ff66";

    HAND_CONNECTIONS.forEach(([a,b])=>{

        skeletonCtx.beginPath();

        skeletonCtx.moveTo(
            landmarks[a].x * skeletonCanvas.width,
            landmarks[a].y * skeletonCanvas.height
        );

        skeletonCtx.lineTo(
            landmarks[b].x * skeletonCanvas.width,
            landmarks[b].y * skeletonCanvas.height
        );

        skeletonCtx.stroke();

    });

    // Titik sendi
    skeletonCtx.fillStyle = "#ffffff";

    landmarks.forEach(point=>{

        skeletonCtx.beginPath();

        skeletonCtx.arc(
            point.x * skeletonCanvas.width,
            point.y * skeletonCanvas.height,
            5,
            0,
            Math.PI * 2
        );

        skeletonCtx.fill();

    });

}

function countFingers(landmarks){

    let total = 0;

    // Empat jari (telunjuk, tengah, manis, kelingking)
    const tips = [8,12,16,20];

    for(let i=0;i<tips.length;i++){

        const tip = tips[i];
        const pip = tip - 2;

        if(landmarks[tip].y < landmarks[pip].y){
            total++;
        }

    }

    // Ibu jari
    // Catatan: asumsi kamera depan (selfie).
    // Jika nanti hasilnya terbalik, tinggal ubah "<" menjadi ">"
    if(landmarks[4].x > landmarks[3].x){
        total++;
    }

    return total;

}

function handMoved(currentLandmarks){

    if(!currentLandmarks) return false;

    if(lastLandmarks === null){

        lastLandmarks = currentLandmarks.map(p=>({
            x:p.x,
            y:p.y
        }));

        return false;

    }

    let movement = 0;

    for(let i=0;i<21;i++){

        movement += Math.abs(
            currentLandmarks[i].x -
            lastLandmarks[i].x
        );

        movement += Math.abs(
            currentLandmarks[i].y -
            lastLandmarks[i].y
        );

    }

    lastLandmarks = currentLandmarks.map(p=>({
        x:p.x,
        y:p.y
    }));

    return movement > 0.03;

}

function freezeFrame(){

    freezeCanvas.width = video.videoWidth;
    freezeCanvas.height = video.videoHeight;

    freezeCtx.drawImage(
        video,
        0,
        0,
        freezeCanvas.width,
        freezeCanvas.height
    );

    freezeCanvas.style.display = "block";

}

function unfreezeFrame(){

    freezeCanvas.style.display = "none";

}

function processHand(fingerCount, landmarks){

    // 0 jari = freeze + musik berhenti
    if(fingerCount === 0){

        if(!isFrozen){

            freezeFrame();

            isFrozen = true;

        }

        if(isMusicPlaying){

            bgm.pause();

            bgm.currentTime = 0;

            isMusicPlaying = false;

        }

        video.style.filter = "blur(0px)";

        return;

    }

    // Kamera kembali normal
    if(isFrozen){

        unfreezeFrame();

        isFrozen = false;

    }

    // 2 atau 3 jari bergerak = musik menyala
    if(
        (fingerCount === 2 || fingerCount === 3) &&
        handMoved(landmarks)
    ){

        if(!isMusicPlaying){

            bgm.play().catch(err=>{
                console.log(err);
            });

            isMusicPlaying = true;

        }

    }else{

        if(isMusicPlaying){

            bgm.pause();

            bgm.currentTime = 0;

            isMusicPlaying = false;

        }

    }

    // 5 jari = blur
    if(fingerCount === 5){

        video.style.filter = "blur(18px)";

    }else{

        video.style.filter = "blur(0px)";

    }

}

window.addEventListener("resize", () => {

    if(video.videoWidth > 0){

        freezeCanvas.width = video.videoWidth;
        freezeCanvas.height = video.videoHeight;

        skeletonCanvas.width = video.videoWidth;
        skeletonCanvas.height = video.videoHeight;

    }

});

video.addEventListener("loadedmetadata", () => {

    freezeCanvas.width = video.videoWidth;
    freezeCanvas.height = video.videoHeight;

    skeletonCanvas.width = video.videoWidth;
    skeletonCanvas.height = video.videoHeight;

});

document.addEventListener("visibilitychange", () => {

    if(document.hidden){

        bgm.pause();

    }

});

</script>

</body>
</html>
