<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hand Blur Camera</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial;display:flex;flex-direction:column;align-items:center}
#wrap{position:relative;width:min(95vw,480px);margin-top:20px}
video,canvas{width:100%;border-radius:16px}
video{filter:blur(0);transition:filter .25s}
#status{margin:12px}
</style></head><body>
<h3>Live Camera Blur (Demo)</h3>
<div id="wrap"><video id="video" autoplay playsinline muted></video></div>
<div id="status">Memuat...</div>
<script type="module">
import {FilesetResolver, HandLandmarker} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";
const v=document.getElementById("video"),s=document.getElementById("status");
const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
v.srcObject=stream;
await v.play();
const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
const hand=await HandLandmarker.createFromOptions(vision,{baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"},runningMode:"VIDEO",numHands:1});
function count(l){
 let tips=[4,8,12,16,20],c=0;
 if(l[4].x<l[3].x)c++;
 [[8,6],[12,10],[16,14],[20,18]].forEach(p=>{if(l[p[0]].y<l[p[1]].y)c++;});
 return c;
}
function loop(){
 let r=hand.detectForVideo(v,performance.now());
 let n=0;
 if(r.landmarks&&r.landmarks.length)n=count(r.landmarks[0]);
 v.style.filter=n>=5?"blur(12px)":"blur(0)";
 s.textContent="Jari: "+n+(n>=5?" (BLUR)":" (NORMAL)");
 requestAnimationFrame(loop);
}
loop();
</script></body></html>
